name: spanish_tutor
description: 西班牙语AI语音学习App — 与AI老师实时语音对话，覆盖A1-B1完整课程
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: 6.1.5+1

  # 本地数据库 (SQLite)
  sqflite: 2.4.1
  path_provider: 2.1.5
  path: 1.9.1

  # 网络请求
  http: 1.5.0

  # 音频录制与播放 — 锁定版本，修复文档中版本不明确的问题
  flutter_sound: 9.17.2

  # 权限处理
  permission_handler: 11.4.0

  # UUID生成
  uuid: 4.5.1

  # 本地键值存储（用于保存API Key等配置）
  shared_preferences: 2.5.3

  # 图标
  cupertino_icons: 1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
